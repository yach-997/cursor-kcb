<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <title>强制更新课表助手</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 420px;
        margin: 40px auto;
        padding: 0 16px;
        line-height: 1.6;
        color: #142;
      }
      a.btn {
        display: block;
        margin: 12px 0;
        padding: 14px;
        background: #0d6e5a;
        color: #fff;
        text-align: center;
        text-decoration: none;
        border-radius: 12px;
        font-weight: 700;
      }
      code {
        word-break: break-all;
        background: #f3f7f5;
        padding: 2px 4px;
      }
      .step {
        margin: 16px 0;
        padding: 12px;
        background: #fff;
        border: 1px solid #d7e5df;
        border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <h1>手机打不开新版？</h1>
    <p>旧缓存会拦截更新。请按顺序做：</p>

    <div class="step">
      <strong>① 先点这个清理</strong>
      <a class="btn" href="./clear.html?t=1">清理缓存并进入新版</a>
    </div>

    <div class="step">
      <strong>② 若还是旧版</strong>
      <p>用系统浏览器打开（不要点桌面图标）：</p>
      <p><code id="u"></code></p>
      <p>然后：浏览器菜单 → <b>删除桌面图标 / 清除网站数据</b> → 再重新打开上面的链接。</p>
    </div>

    <div class="step">
      <strong>③ 安卓 Chrome 清站点数据</strong>
      <p>地址栏左侧锁头/网站信息 → 网站设置 → <b>清除并重置</b> / 删除数据。</p>
    </div>

    <script>
      document.getElementById('u').textContent =
        location.origin + location.pathname.replace(/update\.html$/i, '')
      // 尝试就地杀掉 SW
      ;(async function () {
        try {
          if ('serviceWorker' in navigator) {
            var regs = await navigator.serviceWorker.getRegistrations()
            await Promise.all(regs.map(function (r) { return r.unregister() }))
          }
          if (caches) {
            var keys = await caches.keys()
            await Promise.all(keys.map(function (k) { return caches.delete(k) }))
          }
        } catch (e) {}
      })()
    </script>
  </body>
</html>
