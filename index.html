<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#0d6e5a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="课表助手" />
    <meta name="description" content="四川轻化工大学课表助手 · 本地课表" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <title>川轻化课表助手</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #eef6f2;
        color: #14231e;
        font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei',
          sans-serif;
      }
      #boot {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 24px;
        box-sizing: border-box;
        text-align: center;
      }
      #boot .logo {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        background: #0d6e5a;
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 1.4rem;
        font-weight: 700;
      }
      #boot p {
        margin: 0;
        color: #5a6f67;
        font-size: 0.95rem;
      }
      /* 微信/QQ 内强制引导到手机浏览器（不可关闭） */
      #ext-open {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        background: #0a1410;
        color: #fff;
        box-sizing: border-box;
        padding: 28px 20px;
        font-family: inherit;
        overflow: auto;
      }
      #ext-open.show {
        display: flex;
        flex-direction: column;
      }
      #ext-open .arrow {
        display: none;
        align-self: flex-end;
        margin: 0 4px 8px 0;
        font-size: 2.6rem;
        line-height: 1;
        color: #7dffa8;
      }
      #ext-open .arrow.show {
        display: block;
      }
      #ext-open .card {
        margin-top: auto;
        margin-bottom: auto;
        border-radius: 18px;
        background: #fff;
        color: #14231e;
        padding: 22px 18px;
      }
      #ext-open h1 {
        margin: 0;
        font-size: 1.2rem;
      }
      #ext-open p {
        margin: 10px 0 0;
        font-size: 0.9rem;
        line-height: 1.6;
        color: #5a6f67;
      }
      #ext-open .steps {
        margin: 14px 0 0;
        padding: 0 0 0 1.1rem;
        color: #14231e;
        font-size: 0.9rem;
        line-height: 1.7;
      }
      #ext-open .btn {
        display: block;
        width: 100%;
        margin-top: 18px;
        border: 0;
        border-radius: 12px;
        background: #0d6e5a;
        color: #fff;
        font-size: 1rem;
        font-weight: 700;
        padding: 14px 16px;
        cursor: pointer;
      }
      #ext-open .btn2 {
        display: block;
        width: 100%;
        margin-top: 10px;
        border: 1px solid #d5e3dc;
        border-radius: 12px;
        background: #f3f7f5;
        color: #14231e;
        font-size: 0.9rem;
        font-weight: 600;
        padding: 12px 16px;
        cursor: pointer;
      }
      html.in-app-lock #root,
      body.in-app-lock #root {
        display: none !important;
      }
    </style>
    <script>
      /* 尽早杀掉 Service Worker */
      (function () {
        try {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              regs.forEach(function (r) {
                r.unregister()
              })
            })
          }
          if (window.caches) {
            caches.keys().then(function (keys) {
              keys.forEach(function (k) {
                caches.delete(k)
              })
            })
          }
        } catch (e) {}
      })()

      /**
       * 微信 / QQ / TIM 内打开：全屏拦住，引导去手机浏览器。
       * 安卓点按钮用 Intent 跳转（需用户点击，自动跳常被拦截）。
       * iOS 无法自动开 Safari，只能右上角打开或复制链接。
       */
      ;(function () {
        var ua = navigator.userAgent || ''
        // 覆盖常见内置浏览器 UA（含 TIM、部分 QQ 变体）
        var inApp =
          /MicroMessenger/i.test(ua) ||
          (/QQ\//i.test(ua) && !/QQBrowser/i.test(ua)) ||
          /TIM\//i.test(ua)
        if (!inApp) return

        document.documentElement.classList.add('in-app-lock')
        try {
          document.body.classList.add('in-app-lock')
        } catch (e) {}

        var android = /Android/i.test(ua)
        var ios = /iPhone|iPad|iPod/i.test(ua)
        var wechat = /MicroMessenger/i.test(ua)

        function currentUrl() {
          // 给外跳用干净地址，避免带一堆调试参数
          try {
            var u = new URL(location.href)
            ;['_v', '_refresh', 'cleared'].forEach(function (k) {
              u.searchParams.delete(k)
            })
            return u.toString()
          } catch (e) {
            return location.href
          }
        }

        function intentUrl(url) {
          try {
            var u = new URL(url)
            var rest = u.host + u.pathname + u.search + u.hash
            var scheme = (u.protocol || 'https:').replace(':', '') || 'https'
            // 优先拉起 Chrome；没有则由系统选择浏览器
            return (
              'intent://' +
              rest +
              '#Intent;scheme=' +
              scheme +
              ';package=com.android.chrome;' +
              'S.browser_fallback_url=' +
              encodeURIComponent(url) +
              ';end'
            )
          } catch (e) {
            return url
          }
        }

        function jumpAndroid() {
          var url = currentUrl()
          // 先试 Chrome Intent，再试通用 VIEW
          location.href = intentUrl(url)
          setTimeout(function () {
            try {
              var u = new URL(url)
              var rest = u.host + u.pathname + u.search + u.hash
              var scheme = (u.protocol || 'https:').replace(':', '') || 'https'
              location.href =
                'intent://' +
                rest +
                '#Intent;scheme=' +
                scheme +
                ';action=android.intent.action.VIEW;category=android.intent.category.BROWSABLE;end'
            } catch (e) {}
          }, 800)
        }

        function copyLink(btn) {
          var url = currentUrl()
          var done = function () {
            if (btn) btn.textContent = '已复制，请到手机浏览器粘贴打开'
          }
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(url).then(done, function () {
              window.prompt('复制链接到手机浏览器打开：', url)
            })
          } else {
            window.prompt('复制链接到手机浏览器打开：', url)
          }
        }

        function showGate() {
          var el = document.getElementById('ext-open')
          if (!el) return
          el.classList.add('show')
          el.setAttribute('aria-hidden', 'false')
          try {
            document.body.classList.add('in-app-lock')
          } catch (e) {}

          var title = document.getElementById('ext-title')
          var desc = document.getElementById('ext-desc')
          var steps = document.getElementById('ext-steps')
          var btn = document.getElementById('ext-btn')
          var btn2 = document.getElementById('ext-btn2')
          var arrow = document.getElementById('ext-arrow')

          if (title) title.textContent = '请用手机浏览器打开'
          if (desc) {
            desc.textContent = wechat
              ? '当前在微信里打开。课表 PDF 在这里经常选不到，请先到手机浏览器打开本站。'
              : '当前在 QQ 里打开。课表 PDF 在这里经常选不到，请先到手机浏览器打开本站。'
          }

          if (android) {
            if (arrow) arrow.classList.remove('show')
            if (steps) {
              steps.innerHTML =
                '<li>点下方绿色按钮</li><li>选择 Chrome / 手机浏览器打开</li><li>再回来导入课表 PDF</li>'
            }
            if (btn) {
              btn.style.display = 'block'
              btn.textContent = '用手机浏览器打开'
              btn.onclick = function () {
                jumpAndroid()
              }
            }
            if (btn2) {
              btn2.style.display = 'block'
              btn2.textContent = '复制链接手动打开'
              btn2.onclick = function () {
                copyLink(btn2)
              }
            }
          } else if (ios) {
            if (arrow) arrow.classList.add('show')
            if (steps) {
              steps.innerHTML = wechat
                ? '<li>点右上角 <b>···</b></li><li>选「在 Safari 中打开」</li><li>再导入课表 PDF</li>'
                : '<li>点右上角 <b>···</b></li><li>选「在浏览器打开」或 Safari</li><li>再导入课表 PDF</li>'
            }
            if (btn) {
              btn.style.display = 'block'
              btn.textContent = '复制链接'
              btn.onclick = function () {
                copyLink(btn)
              }
            }
            if (btn2) btn2.style.display = 'none'
          } else {
            if (arrow) arrow.classList.add('show')
            if (steps) {
              steps.innerHTML =
                '<li>点右上角 <b>···</b></li><li>选「在浏览器打开」</li>'
            }
            if (btn) {
              btn.style.display = 'block'
              btn.textContent = '复制链接'
              btn.onclick = function () {
                copyLink(btn)
              }
            }
            if (btn2) btn2.style.display = 'none'
          }
        }

        function boot() {
          showGate()
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', boot)
        } else {
          boot()
        }
        // React 挂载后再锁一次，防止被盖住
        setTimeout(showGate, 0)
        setTimeout(showGate, 300)
        setTimeout(showGate, 1000)
      })()
    </script>
  </head>
  <body>
    <div id="ext-open" aria-hidden="true">
      <div id="ext-arrow" class="arrow">↗</div>
      <div class="card">
        <h1 id="ext-title">请用手机浏览器打开</h1>
        <p id="ext-desc"></p>
        <ol id="ext-steps" class="steps"></ol>
        <button type="button" class="btn" id="ext-btn">用手机浏览器打开</button>
        <button type="button" class="btn2" id="ext-btn2">复制链接手动打开</button>
      </div>
    </div>
    <div id="root">
      <div id="boot">
        <div class="logo">课</div>
        <p>课表助手加载中…</p>
        <p style="font-size: 0.8rem">首次打开可能需要几秒，请稍候</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
